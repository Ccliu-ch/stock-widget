name: Build Windows MSI

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    # 全局开启允许不安全旧Node版本，消除警告
    env:
      ACTIONS_ALLOW_USE_UNSECURE_NODE_VERSION: true
      CARGO_UNSTABLE_SPARSE_REGISTRY: true
      CARGO_TARGET_DIR: src-tauri/target
    steps:
      - name: Checkout source code
        uses: actions/checkout@v4
        with:
          fetch-tags: true

      - name: Cache Node modules
        uses: actions/cache@v3
        with:
          path: node_modules
          key: ${{ runner.os }}-node20-${{ hashFiles('package-lock.json') }}

      # 强制使用 Node 20
      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Cache Rust
        uses: actions/cache@v3
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            src-tauri/target
          key: ${{ runner.os }}-rust-stable-${{ hashFiles('src-tauri/Cargo.lock') }}

      - name: Setup Stable Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: windows-gnu

      - name: Install WiX Toolset v3.11
        run: |
          $wixZip = "wix311-binaries.zip"
          $wixRoot = "C:\Program Files (x86)\WiX Toolset v3.11"
          $wixBin = "$wixRoot\bin"
          curl -L https://github.com/wixtoolset/wix3/releases/download/wix3112rtm/wix311-binaries.zip -o $wixZip
          New-Item -ItemType Directory -Path $wixRoot -Force
          7z x $wixZip -o"$wixRoot" -y
          Add-Content $env:GITHUB_PATH "$wixBin"
          Remove-Item $wixZip -Force

      - name: Install npm dependencies
        run: npm install --force

      - name: Extract version from tag
        id: get_version
        run: |
          if ($env:GITHUB_REF -match 'refs/tags/v(.+)') {
            echo "VERSION=$($matches[1])" >> $env:GITHUB_ENV
          } else {
            echo "VERSION=dev" >> $env:GITHUB_ENV
          }

      - name: Build Tauri MSI Installer
        run: npx tauri build --bundles msi --verbose

      - name: Upload MSI Artifact
        uses: actions/upload-artifact@v4
        with:
          name: stock-widget-msi-v${{ env.VERSION }}
          path: src-tauri/target/release/bundle/msi/*.msi
          retention-days: 90

      - name: Create GitHub Release
        if: env.VERSION != 'dev'
        uses: softprops/action-gh-release@v1
        with:
          tag_name: v${{ env.VERSION }}
          files: src-tauri/target/release/bundle/msi/*.msi
          generate_release_notes: true
          draft: false
          prerelease: false
