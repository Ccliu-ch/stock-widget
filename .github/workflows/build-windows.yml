name: Build Windows MSI

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    env:
      CARGO_UNSTABLE_SPARSE_REGISTRY: true
    steps:
      - name: Checkout source code
        uses: actions/checkout@v4
        with:
          fetch-tags: true

      - name: Cache Node modules
        uses: actions/cache@v3
        with:
          path: node_modules
          key: ${{ runner.os }}-node20-${{ hashFiles('package-lock.json') }}

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Cache Rust
        uses: actions/cache@v3
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            src-tauri/target
          key: ${{ runner.os }}-rust-stable-${{ hashFiles('src-tauri/Cargo.lock') }}

      - name: Setup Stable Rust (MSVC)
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Install WiX Toolset v3.11
        shell: pwsh
        run: |
          $wixZip = "$env:TEMP\wix311.zip"
          $wixDir = "C:\wix311"
          Invoke-WebRequest -Uri "https://github.com/wixtoolset/wix3/releases/download/wix3112rtm/wix311-binaries.zip" -OutFile $wixZip
          New-Item -ItemType Directory -Path $wixDir -Force | Out-Null
          Expand-Archive -Path $wixZip -DestinationPath $wixDir -Force
          "$wixDir" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
          Remove-Item $wixZip -Force
          & "$wixDir\candle.exe" -?

      - name: Install npm dependencies
        run: npm install --force

      - name: Extract version from tag
        id: get_version
        run: |
          if ($env:GITHUB_REF -match 'refs/tags/v(.+)') {
            echo "VERSION=$($matches[1])" >> $env:GITHUB_ENV
          } else {
            echo "VERSION=dev" >> $env:GITHUB_ENV
          }

      - name: Build Tauri MSI Installer
        run: npx tauri build --bundles msi --verbose

      - name: Build NSIS Installer (fallback)
        run: npx tauri build --bundles nsis
        continue-on-error: true

      - name: Upload MSI Artifact
        uses: actions/upload-artifact@v4
        with:
          name: stock-widget-msi-v${{ env.VERSION }}
          path: src-tauri/target/release/bundle/msi/*.msi
          if-no-files-found: warn
          retention-days: 90

      - name: Upload NSIS Artifact
        uses: actions/upload-artifact@v4
        with:
          name: stock-widget-nsis-v${{ env.VERSION }}
          path: src-tauri/target/release/bundle/nsis/*.exe
          if-no-files-found: warn
          retention-days: 90

      - name: Create GitHub Release
        if: env.VERSION != 'dev'
        uses: softprops/action-gh-release@v1
        with:
          tag_name: v${{ env.VERSION }}
          files: |
            src-tauri/target/release/bundle/msi/*.msi
            src-tauri/target/release/bundle/nsis/*.exe
          generate_release_notes: true
          draft: false
          prerelease: false
