name: Build Windows MSI

# 双触发：打tag自动发布 + 页面手动运行测试
on:
  push:
    tags:
      - 'v*'
  workflow_dispatch: # 手动触发按钮

jobs:
  build:
    runs-on: windows-latest
    env:
      # 解决Windows长路径编译报错
      CARGO_UNSTABLE_SPARSE_REGISTRY: true
      CARGO_TARGET_DIR: src-tauri/target
    steps:
      - name: Checkout source code
        uses: actions/checkout@v4
        with:
          fetch-tags: true # 读取tag版本号

      # 1. Node缓存加速依赖
      - name: Cache Node modules
        uses: actions/cache@v3
        with:
          path: node_modules
          key: ${{ runner.os }}-node-${{ hashFiles('package-lock.json') }}

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm' # 内置npm缓存

      # 2. Rust工具链缓存，避免重复下载
      - name: Cache Rust
        uses: actions/cache@v3
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            src-tauri/target
          key: ${{ runner.os }}-rust-stable-${{ hashFiles('src-tauri/Cargo.lock') }}

      - name: Setup Stable Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: windows-gnu # Windows编译必备组件

      # 3. 修复WiX安装脚本（PowerShell标准写法，目录正确）
      - name: Install WiX Toolset v3.11
        run: |
          $wixZip = "wix311-binaries.zip"
          $wixRoot = "C:\Program Files (x86)\WiX Toolset v3.11"
          $wixBin = "$wixRoot\bin"
          # 下载压缩包
          curl -L https://github.com/wixtoolset/wix3/releases/download/wix3112rtm/wix311-binaries.zip -o $wixZip
          # 新建完整根目录，解压到根目录而非bin
          New-Item -ItemType Directory -Path $wixRoot -Force
          7z x $wixZip -o"$wixRoot" -y
          # 将bin目录加入PATH
          Add-Content $env:GITHUB_PATH "$wixBin"
          # 删除压缩包释放空间
          Remove-Item $wixZip -Force

      - name: Install npm dependencies
        run: npm install --force

      # 读取tag版本号，注入环境变量给Tauri
      - name: Extract version from tag
        id: get_version
        run: |
          if ($env:GITHUB_REF -match 'refs/tags/v(.+)') {
            echo "VERSION=$($matches[1])" >> $env:GITHUB_ENV
          } else {
            echo "VERSION=dev" >> $env:GITHUB_ENV
          }

      # 增加verbose详细日志，仅打包MSI
      - name: Build Tauri MSI Installer
        run: npx tauri build --bundles msi --verbose

      # 制品动态带版本号，区分不同发布包
      - name: Upload MSI Artifact
        uses: actions/upload-artifact@v4
        with:
          name: stock-widget-msi-v${{ env.VERSION }}
          path: src-tauri/target/release/bundle/msi/*.msi
          retention-days: 90 # 制品保留90天，默认30天
