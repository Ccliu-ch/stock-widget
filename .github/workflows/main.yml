name: Build Windows MSI

# 触发规则：推送v开头tag自动打包发布 + 页面手动运行测试
on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    env:
      CARGO_UNSTABLE_SPARSE_REGISTRY: true
      CARGO_TARGET_DIR: src-tauri/target
    steps:
      - name: Checkout source code
        uses: actions/checkout@v4
        with:
          fetch-tags: true

      # Node依赖缓存
      - name: Cache Node modules
        uses: actions/cache@v3
        with:
          path: node_modules
          key: ${{ runner.os }}-node24-${{ hashFiles('package-lock.json') }}

      # 升级Node24 彻底消除废弃警告
      - name: Setup Node.js 24
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      # Rust工具链缓存，加速编译
      - name: Cache Rust
        uses: actions/cache@v3
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            src-tauri/target
          key: ${{ runner.os }}-rust-stable-${{ hashFiles('src-tauri/Cargo.lock') }}

      # 安装稳定Rust，附带Windows编译必备组件
      - name: Setup Stable Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: windows-gnu

      # 修复WiX安装脚本（PowerShell标准语法，解压目录正确，自动清理压缩包）
      - name: Install WiX Toolset v3.11
        run: |
          $wixZip = "wix311-binaries.zip"
          $wixRoot = "C:\Program Files (x86)\WiX Toolset v3.11"
          $wixBin = "$wixRoot\bin"
          curl -L https://github.com/wixtoolset/wix3/releases/download/wix3112rtm/wix311-binaries.zip -o $wixZip
          New-Item -ItemType Directory -Path $wixRoot -Force
          7z x $wixZip -o"$wixRoot" -y
          Add-Content $env:GITHUB_PATH "$wixBin"
          Remove-Item $wixZip -Force

      - name: Install npm dependencies
        run: npm install --force

      # 提取tag版本号，手动构建标记为dev
      - name: Extract version from tag
        id: get_version
        run: |
          if ($env:GITHUB_REF -match 'refs/tags/v(.+)') {
            echo "VERSION=$($matches[1])" >> $env:GITHUB_ENV
          } else {
            echo "VERSION=dev" >> $env:GITHUB_ENV
          }

      # 打包MSI，开启verbose详细日志方便排错
      - name: Build Tauri MSI Installer
        run: npx tauri build --bundles msi --verbose

      # 上传制品，名称带版本，保留90天
      - name: Upload MSI Artifact
        uses: actions/upload-artifact@v4
        with:
          name: stock-widget-msi-v${{ env.VERSION }}
          path: src-tauri/target/release/bundle/msi/*.msi
          retention-days: 90

      # 仅tag发布时自动创建GitHub Release并上传安装包
      - name: Create GitHub Release
        if: env.VERSION != 'dev'
        uses: softprops/action-gh-release@v1
        with:
          tag_name: v${{ env.VERSION }}
          files: src-tauri/target/release/bundle/msi/*.msi
          generate_release_notes: true
          draft: false
          prerelease: false
